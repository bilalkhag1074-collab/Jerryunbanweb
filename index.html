<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jerry WhatsApp Unban</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;background:#05060a;color:#fff;font-family:Arial}
.topbar{display:flex;align-items:center;padding:10px;color:#06f6d7}
.menu-btn{font-size:22px;background:none;border:none;color:#06f6d7}
.sidebar{position:fixed;left:-240px;width:240px;height:100%;background:#111;padding:60px 10px;transition:.3s}
.sidebar.active{left:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none}
.overlay.active{display:block}
.robot{text-align:center;margin-top:40px}
.robot img{width:120px;height:120px;border-radius:50%}
input,select,button{display:block;margin:10px auto;padding:10px;width:260px;border-radius:8px;border:none}
button{background:linear-gradient(90deg,#06f6d7,#7c5cff);font-weight:bold}
</style>
</head>

<body>

<div class="topbar">
<button class="menu-btn" id="menu">☰</button>
<h3>Jerry WhatsApp</h3>
</div>

<div class="sidebar" id="sidebar">
<a href="https://whatsapp.com/channel/0029Vao7lPA90x339tBFEs1v" target="_blank" style="color:white;text-decoration:none">
WhatsApp Channel
</a>
</div>

<div class="overlay" id="overlay"></div>

<div class="robot">
<img src="https://postimg.cc/pyLFzFv1">
<h2>Jerry WhatsApp Unban</h2>
</div>

<input type="text" id="num" placeholder="Enter WhatsApp Number">
<select id="reason">
<option value="">Select Reason</option>
<option>Spam</option>
<option>Permanen</option>
</select>

<button onclick="send()">Kirim Banding</button>

<script>
document.getElementById("menu").onclick=()=>{
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
}

function send(){
let n=document.getElementById("num").value;
let r=document.getElementById("reason").value;

if(!n||!r){alert("Fill all fields");return;}

let msg=`*Jerry WhatsApp Unban Tool*
Nomor: ${n}
Alasan: ${r}`;

window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
